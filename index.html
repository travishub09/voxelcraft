<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>VoxelCraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #87ceeb; font-family: monospace; }
    #app { width: 100vw; height: 100vh; display: block; }
    canvas { display: block; }

    /* Crosshair */
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 20px; height: 20px; pointer-events: none; z-index: 10;
    }
    #crosshair::before, #crosshair::after {
      content: ""; position: absolute; background: rgba(255,255,255,0.8);
      box-shadow: 0 0 2px rgba(0,0,0,0.8);
    }
    #crosshair::before { left: 9px; top: 0; width: 2px; height: 20px; }
    #crosshair::after { top: 9px; left: 0; height: 2px; width: 20px; }

    /* Start overlay */
    #overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 20;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      color: #fff; text-align: center; cursor: pointer;
    }
    #overlay h1 { font-size: 48px; letter-spacing: 4px; margin-bottom: 16px; text-shadow: 2px 2px 0 #333; }
    #overlay p { font-size: 16px; line-height: 1.8; opacity: 0.9; }
    .hidden { display: none !important; }

    /* HUD */
    #hud {
      position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
      z-index: 10; color: #fff; font-size: 14px; text-shadow: 1px 1px 0 #000;
      background: rgba(0,0,0,0.3); padding: 6px 12px; border-radius: 4px; pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="app"></canvas>
  <div id="crosshair"></div>
  <div id="hud">Selected: <span id="selected-block">grass</span></div>
  <div id="overlay">
    <h1>VOXELCRAFT</h1>
    <p>
      Click to play<br />
      WASD — move &nbsp;|&nbsp; Mouse — look &nbsp;|&nbsp; Space — jump<br />
      Left click — break &nbsp;|&nbsp; Right click — place<br />
      1-4 — select block &nbsp;|&nbsp; Esc — release mouse
    </p>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
